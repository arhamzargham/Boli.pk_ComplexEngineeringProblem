# Boli.pk — Redis 7 configuration (CEP)
# Role: bid cache, EDA bus (Streams), OTP store, active_sessions set
# Redis is NEVER the source of truth for financial values (CLAUDE.md ADR-003)

# ── Network ───────────────────────────────────────────────────
bind 0.0.0.0
protected-mode no
port 6379

# ── Memory ────────────────────────────────────────────────────
maxmemory 256mb
# Evict least-recently-used keys when limit is reached.
# Safe for CEP: bid cache and session sets are ephemeral.
maxmemory-policy allkeys-lru

# ── Persistence (RDB only — no AOF overhead for CEP) ──────────
# Snapshot if at least 1 key changed in the last 900 seconds (15 min)
save 900 1
# Also snapshot if 10+ keys changed in the last 300 seconds
save 300 10
# No append-only file — RDB is sufficient for ephemeral CEP data
appendonly no

# ── Logging ───────────────────────────────────────────────────
loglevel notice

# ── Keyspace notifications ────────────────────────────────────
# Ex = notify on key expiry events (used for OTP TTL expiry)
notify-keyspace-events Ex

# ── Timeouts ──────────────────────────────────────────────────
timeout 0
tcp-keepalive 300
