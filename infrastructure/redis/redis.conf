# Boli.pk Redis configuration
# Redis 7.x — bid cache and EDA bus (Streams)
# Redis is NEVER the source of truth for financial values. PostgreSQL is authoritative.

# Persistence: disabled for CEP (ephemeral cache acceptable)
save ""
appendonly no

# Memory limit — adjust based on available host RAM
maxmemory 256mb
maxmemory-policy allkeys-lru

# Streams: retained for bid audit during auction lifetime
# (PostgreSQL write worker processes and persists permanently)

# Enable keyspace notifications for expired OTP keys
notify-keyspace-events "Ex"
