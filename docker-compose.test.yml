# Boli.pk — Test environment
# Usage: docker-compose -f docker-compose.test.yml up --abort-on-container-exit

version: "3.9"

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boli_test
      POSTGRES_USER: boli_test
      POSTGRES_PASSWORD: boli_test_secret
    volumes:
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boli_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  ai-vetting-test:
    build:
      context: ./services/ai-vetting
      dockerfile: Dockerfile
    environment:
      MOCK_DIRBS: "true"
      MOCK_GSMA_TAC: "true"

  test-runner:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: "postgres://boli_test:boli_test_secret@postgres-test:5432/boli_test?sslmode=disable"
      REDIS_URL: "redis-test:6379"
      AI_VETTING_URL: "http://ai-vetting-test:8002"
      JWT_SECRET: "jwt_test_secret_min_32_chars_long_x"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      ai-vetting-test:
        condition: service_started
