# Boli.pk — single-command CEP deployment
# Usage: docker-compose up --build
#
# Services
#   postgres    PostgreSQL 16 — financial ledger, schema + seed on first start
#   redis       Redis 7       — bid cache, EDA bus, OTP store, session set
#   gateway     Go 1.22       — API gateway + WebSocket bidding engine
#   ai-vetting  Python 3.11   — AI vetting pipeline (placeholder: sleep infinity)
#
# All external dependencies (PTA DIRBS, FBR NTN, payment gateway) are mocked.
# No external internet required after images are pulled.

version: "3.9"

networks:
  boli-network:
    driver: bridge

volumes:
  postgres-data:

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - boli-network
    environment:
      POSTGRES_DB:       boli
      POSTGRES_USER:     boli
      POSTGRES_PASSWORD: boli_dev_secret
    volumes:
      # initdb scripts run in alphabetical order on first start only.
      # 01 = schema (DDL, triggers, constraints)
      # 02 = seed  (demo data for all 6 CEP scenarios)
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infrastructure/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boli -d boli"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - boli-network
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Go Gateway ────────────────────────────────────────────────
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - boli-network
    environment:
      # PostgreSQL DSN — lib/pq format
      DATABASE_URL: "postgres://boli:boli_dev_secret@postgres:5432/boli?sslmode=disable"
      # Redis address — host:port (go-redis Addr field)
      REDIS_URL: "redis:6379"
      # JWT signing secret — minimum 32 chars
      JWT_SECRET: "boli_dev_jwt_secret_min_32_chars_x"
      # AI vetting service base URL
      AI_VETTING_URL: "http://ai-vetting:8002"
      # Bootstrap CLI secret (one-time; rotated after admin setup)
      BOOTSTRAP_SECRET: "boli_dev_bootstrap_secret"
      # Max simultaneous active listings per seller (CLAUDE.md Gap 20)
      MAX_ACTIVE_LISTINGS_PER_SELLER: "5"
      # Gin mode: debug for CEP, release for production
      GIN_MODE: "debug"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── AI Vetting (placeholder) ──────────────────────────────────
  # Full FastAPI implementation comes after the Go gateway is complete.
  # Placeholder keeps the service discoverable on boli-network so
  # gateway environment variable AI_VETTING_URL resolves correctly.
  ai-vetting:
    image: python:3.11-slim
    restart: unless-stopped
    networks:
      - boli-network
    environment:
      MOCK_DIRBS:    "true"
      MOCK_GSMA_TAC: "true"
    command: ["sleep", "infinity"]
    # No ports exposed — only reachable by gateway on boli-network

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - boli-network
    environment:
      # Server-side fetch uses gateway directly (not via browser proxy)
      API_URL: "http://gateway:8080"
      NODE_ENV: "production"
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy
