
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--c1:#1A1A2E;--border:var(--color-border-tertiary)}
.diagram{padding:1rem 0;font-family:var(--font-mono);font-size:11px}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;font-family:var(--font-sans);font-size:12px}
.leg{padding:3px 10px;border-radius:10px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.leg.on{border-color:currentColor;font-weight:700}
.groups-wrap{display:flex;flex-direction:column;gap:20px}
.group{border-radius:10px;padding:12px;border:1.5px solid}
.group-title{font-family:var(--font-sans);font-size:12px;font-weight:700;margin-bottom:10px;letter-spacing:.04em;text-transform:uppercase}
.classes-row{display:flex;flex-wrap:wrap;gap:10px}
.uml-class{border:1.5px solid var(--color-border-primary);border-radius:6px;min-width:220px;max-width:260px;background:var(--color-background-primary);flex:1 1 220px}
.uml-head{padding:6px 10px;text-align:center;border-radius:4px 4px 0 0}
.uml-head .name{font-family:var(--font-sans);font-size:12px;font-weight:700;color:#fff}
.uml-head .stereo{font-family:var(--font-sans);font-size:10px;color:rgba(255,255,255,0.75);font-style:italic}
.uml-section{border-top:1px solid var(--color-border-tertiary);padding:5px 8px}
.uml-attr{font-size:10px;color:var(--color-text-secondary);padding:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uml-attr .vis{color:var(--color-text-tertiary);margin-right:3px}
.uml-attr .type{color:var(--color-text-tertiary);font-size:9px}
.uml-attr .constraint{color:var(--color-text-tertiary);font-size:9px;font-style:italic}
.uml-method{font-size:10px;color:var(--color-text-primary);padding:1px 0}
.uml-inv{font-size:9px;color:#854F0B;padding:1px 0;font-style:italic;border-top:1px dashed #EF9F27;margin-top:3px;padding-top:3px}
.section-div{font-family:var(--font-sans);font-size:10px;color:var(--color-text-tertiary);font-style:italic;padding:2px 0}
.rels{margin-top:14px;font-family:var(--font-sans);font-size:11px}
.rels-title{font-size:12px;font-weight:600;color:var(--color-text-secondary);margin-bottom:6px}
.rel-row{display:flex;align-items:center;gap:6px;padding:2px 0;color:var(--color-text-secondary)}
.rel-from,.rel-to{font-family:var(--font-mono);font-size:11px;color:var(--color-text-primary);font-weight:500}
.rel-sym{color:var(--color-text-tertiary);font-size:11px;min-width:60px;text-align:center}
.rel-label{font-size:10px;color:var(--color-text-tertiary);font-style:italic}
.rel-card{font-size:10px;color:var(--color-text-tertiary)}
</style>

 ],
 rels:[
  ["Dispute","1","*--","1","AdminApproval","requires"],
 ]
},
];

const CROSS=[
 ["User","1","o--","0..*","Listing","creates"],
 ["User","1","*--","1","Wallet","owns"],
 ["User","1","o--","0..*","Bid","places"],
 ["User","1","o--","0..*","Notification","receives"],
 ["User","1","o--","0..*","Penalty","subject of"],
 ["User","1","o--","0..*","SellerSuspension","subject of"],
 ["User","1","o--","0..*","IdempotencyKey","scoped to"],
 ["Listing","1","o--","0..1","Auction","listed in"],
 ["Auction","1","..>","0..1","Transaction","produces on close"],
 ["Transaction","1","*--","1","Escrow","holds funds in"],
 ["Transaction","1","*--","0..1","Dispute","escalated to"],
 ["Transaction","1","*--","0..1","SettlementReceipt","proven by"],
 ["Penalty","0..*","-->","1","PenaltyConsentRecord","requires consent"],
];

const SYM={"*--":"◆—","o--":"◇—","..>":"- - ▷","-->":"——▷","--":"———"};

let activeG=null;

function buildLegend(){
 const l=document.getElementById('leg');
 l.innerHTML=['All',...G.map(g=>g.label)].map((lbl,i)=>{
  const g=G[i-1];
  const isOn=i===0?activeG===null:activeG===g?.id;
  const bg=i===0?'var(--color-background-secondary)':g.bg;
  const col=i===0?'var(--color-text-primary)':g.head;
  return `<span class="leg${isOn?' on':''}" style="background:${bg};color:${col};${isOn?`border-color:${col}`:'border-color:transparent'}" onclick="setG(${i===0?'null':`'${g.id}'`})">${lbl}</span>`;
 }).join('');
}

function renderClass(cls,head){
 return `<div class="uml-class">
  <div class="uml-head" style="background:${head}">
   <div class="stereo">&lt;&lt;${cls.stereo}&gt;&gt;</div>
   <div class="name">${cls.name}</div>
  </div>
  <div class="uml-section">
   ${cls.attrs.map(([v,n,t,c])=>`<div class="uml-attr"><span class="vis">${v}</span>${n} : <span class="type">${t}</span>${c?` <span class="constraint">{${c}}</span>`:''}</div>`).join('')}
  </div>
  <div class="uml-section">
   ${cls.methods.map(m=>`<div class="uml-method">+ ${m}</div>`).join('')}
   ${cls.inv.length?`<div class="uml-inv">${cls.inv.map(i=>`⚑ ${i}`).join('<br>')}</div>`:''}
  </div>
 </div>`;
}

function renderRels(rels){
 if(!rels.length)return'';
 return`<div class="rels">
  <div class="rels-title">Relationships</div>
  ${rels.map(([f,cf,s,ct,t,l])=>`<div class="rel-row">
   <span class="rel-from">${f}</span>
   <span class="rel-card">${cf}</span>
   <span class="rel-sym">${SYM[s]||s}</span>
   <span class="rel-card">${ct}</span>
   <span class="rel-to">${t}</span>
   <span class="rel-label">${l}</span>
  </div>`).join('')}
 </div>`;
}

function render(){
 const gw=document.getElementById('gw');
 const vis=activeG?G.filter(g=>g.id===activeG):G;
 gw.innerHTML=vis.map(g=>`
  <div class="group" style="background:${g.bg};border-color:${g.border}">
   <div class="group-title" style="color:${g.head}">${g.label}</div>
   <div class="classes-row">${g.classes.map(c=>renderClass(c,g.head)).join('')}</div>
   ${renderRels(g.rels)}
  </div>
 `).join('')+(!activeG?`
  <div class="group" style="background:var(--color-background-secondary);border-color:var(--color-border-secondary)">
   <div class="group-title" style="color:var(--color-text-secondary)">Cross-Package Relationships</div>
   ${renderRels(CROSS)}
  </div>`:'');
}

function setG(id){activeG=id;buildLegend();render();}
buildLegend();render();
</script>
